# User provisioning: one vault variable per user.
# Adding a user: add user_<username>_password and user_<username>_email to ansible/vars/vault.yml
# Example:
#   user_health_password: "strong-random-value"
#   user_health_email: "bran.van.der.meer@protonmail.com"
# Never commit vault.yml. Run: ansible-vault encrypt ansible/vars/vault.yml
- hosts: all
  vars_files:
    - vars/vault.yml
  tasks:
    - name: Create app directory
      file:
        path: /home/deploy/health
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: ../docker-compose.yml
        dest: /home/deploy/health/docker-compose.yml
        owner: deploy
        group: deploy

    - name: Copy Caddyfile
      copy:
        src: ../Caddyfile
        dest: /home/deploy/health/Caddyfile
        owner: deploy
        group: deploy

    - name: Template .env
      template:
        src: templates/env.j2
        dest: /home/deploy/health/.env
        owner: deploy
        group: deploy
        mode: "0600"

    - name: Create backups directory
      file:
        path: /home/deploy/backups
        state: directory
        owner: deploy
        group: deploy

    - name: Generate Storage Box SSH key
      community.crypto.openssh_keypair:
        path: /home/deploy/.ssh/storagebox_key
        type: ed25519
        owner: deploy
        group: deploy

    - name: Read Storage Box public key
      command: cat /home/deploy/.ssh/storagebox_key.pub
      register: storagebox_pubkey
      changed_when: false

    - name: Show Storage Box public key (add this to Hetzner Robot panel)
      debug:
        msg: "{{ storagebox_pubkey.stdout }}"

    - name: Create backup log file
      file:
        path: /var/log/health-backup.log
        state: touch
        owner: deploy
        group: deploy
        mode: "0644"

    - name: Template backup script
      template:
        src: templates/backup.sh.j2
        dest: /home/deploy/backup.sh
        owner: deploy
        group: deploy
        mode: "0755"

    - name: Add nightly backup cron
      cron:
        name: nightly postgres backup
        minute: "0"
        hour: "2"
        job: /home/deploy/backup.sh >> /var/log/health-backup.log 2>&1
        user: deploy

    - name: Create OFD import log file
      file:
        path: /var/log/health-ofd-import.log
        state: touch
        owner: deploy
        group: deploy
        mode: "0644"

    - name: Add daily OFD delta import cron
      cron:
        name: daily ofd delta import
        minute: "30"
        hour: "2"
        job: >-
          curl -s -X POST "http://localhost:8080/admin/ofd-import?mode=delta"
          -H "X-Admin-Secret: $(grep -m1 '^OFD_ADMIN_SECRET=' /home/deploy/health/.env | cut -d= -f2-)"
          >> /var/log/health-ofd-import.log 2>&1
        user: deploy

    - name: Start docker compose stack
      community.docker.docker_compose_v2:
        project_src: /home/deploy/health
        state: present

    - name: Derive user list from vault
      set_fact:
        app_users: "{{ query('varnames', '^user_.+_password$')
                           | map('regex_replace', '^user_(.+)_password$', '\\1')
                           | list }}"

    - name: Hash password for {{ item }}
      command: >
        python3 -c "import bcrypt;
        h=bcrypt.hashpw('{{ lookup('vars', 'user_' + item + '_password') }}'.encode(),
        bcrypt.gensalt(12)).decode();
        print(h[:2]+'a'+h[3:] if h[2]=='b' else h)"
      loop: "{{ app_users }}"
      register: pw_hashes
      changed_when: false
      no_log: true
      delegate_to: localhost

    - name: Upsert user {{ item.item }}
      command: >
        docker exec health_postgres psql -U health -d health -c
        "INSERT INTO users (username, password_hash)
         VALUES ('{{ lookup('vars', 'user_' + item.item + '_email') }}', '{{ item.stdout }}')
         ON CONFLICT (username) DO UPDATE SET password_hash = EXCLUDED.password_hash;"
      loop: "{{ pw_hashes.results }}"
      no_log: true

    - name: Hash password for test accounts
      command: >
        python3 -c "import bcrypt;
        h=bcrypt.hashpw('{{ item.password }}'.encode(), bcrypt.gensalt(12)).decode();
        print(h[:2]+'a'+h[3:] if h[2]=='b' else h)"
      loop:
        - { id: '00000000-0000-0000-0000-000000000010', email: 'test+api@bran.name', password: '{{ test_api_account_password }}' }
        - { id: '00000000-0000-0000-0000-000000000020', email: 'test+e2e@bran.name', password: '{{ test_e2e_account_password }}' }
      register: test_pw_hashes
      changed_when: false
      no_log: true
      delegate_to: localhost

    - name: Upsert test account {{ item.item.email }}
      command: >
        docker exec health_postgres psql -U health -d health -c
        "INSERT INTO users (id, username, password_hash)
         VALUES ('{{ item.item.id }}', '{{ item.item.email }}', '{{ item.stdout }}')
         ON CONFLICT (id) DO UPDATE SET password_hash = EXCLUDED.password_hash;"
      loop: "{{ test_pw_hashes.results }}"
      no_log: true
