name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: health_test
          POSTGRES_USER: health
          POSTGRES_PASSWORD: health
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew :server:test
        env:
          SERVER_BASE_URL: https://placeholder

  app-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew :app:test
        env:
          SERVER_BASE_URL: https://placeholder

  build-push:
    if: github.event_name == 'push'
    needs: [server-tests, app-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          build-args: GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/branneman/health-server:latest
            ghcr.io/branneman/health-server:${{ github.sha }}

  api-tests:
    if: github.event_name == 'push'
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5

      - name: Wait for Watchtower to deploy
        env:
          SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
        run: |
          EXPECTED="${{ github.sha }}"
          DEPLOYED=""
          for i in $(seq 1 20); do
            DEPLOYED=$(curl -sf "$SERVER_URL/version" | jq -r .sha 2>/dev/null) || DEPLOYED=""
            [ "$DEPLOYED" = "$EXPECTED" ] && echo "Server updated to $EXPECTED" && break
            echo "Attempt $i/20: deployed='$DEPLOYED', waiting 30s..."
            sleep 30
          done
          [ "$DEPLOYED" = "$EXPECTED" ] || { echo "Timed out waiting for Watchtower"; exit 1; }

      - name: Run API tests
        env:
          API_TEST_SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
          API_TEST_EMAIL: ${{ secrets.API_TEST_EMAIL }}
          API_TEST_PASSWORD: ${{ secrets.API_TEST_PASSWORD }}
        run: ./gradlew :server:apiTest
