name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  server-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: health_test
          POSTGRES_USER: health
          POSTGRES_PASSWORD: health
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew :server:test
        env:
          SERVER_BASE_URL: https://placeholder

  app-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew :app:test
        env:
          SERVER_BASE_URL: https://placeholder

  build-push:
    if: github.event_name == 'push'
    needs: [server-tests, app-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: true
          build-args: GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/branneman/health-server:latest
            ghcr.io/branneman/health-server:${{ github.sha }}

  api-tests:
    if: github.event_name == 'push'
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5

      - name: Wait for Watchtower to deploy
        env:
          SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
        run: |
          EXPECTED="${{ github.sha }}"
          DEPLOYED=""
          for i in $(seq 1 20); do
            DEPLOYED=$(curl -sf "$SERVER_URL/version" | jq -r .sha 2>/dev/null) || DEPLOYED=""
            [ "$DEPLOYED" = "$EXPECTED" ] && echo "Server updated to $EXPECTED" && break
            echo "Attempt $i/20: deployed='$DEPLOYED', waiting 30s..."
            sleep 30
          done
          [ "$DEPLOYED" = "$EXPECTED" ] || { echo "Timed out waiting for Watchtower"; exit 1; }

      - name: Run API tests
        env:
          SERVER_BASE_URL: https://placeholder
          API_TEST_SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
          API_TEST_EMAIL: ${{ secrets.API_TEST_EMAIL }}
          API_TEST_PASSWORD: ${{ secrets.API_TEST_PASSWORD }}
        run: ./gradlew :server:apiTest

      - name: Clear rate limits for API test user
        if: always()
        env:
          SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          API_TEST_EMAIL: ${{ secrets.API_TEST_EMAIL }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $E2E_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$API_TEST_EMAIL\"}" \
            "$SERVER_URL/internal/clear-rate-limits" || true

  e2e-tests:
    if: github.event_name == 'push'
    needs: [build-push, api-tests]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5

      - name: Wait for Watchtower to deploy
        env:
          SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
        run: |
          EXPECTED="${{ github.sha }}"
          DEPLOYED=""
          for i in $(seq 1 20); do
            DEPLOYED=$(curl -sf "$SERVER_URL/version" | jq -r .sha 2>/dev/null) || DEPLOYED=""
            [ "$DEPLOYED" = "$EXPECTED" ] && echo "Server updated to $EXPECTED" && break
            echo "Attempt $i/20: deployed='$DEPLOYED', waiting 30s..."
            sleep 30
          done
          [ "$DEPLOYED" = "$EXPECTED" ] || { echo "Timed out waiting for Watchtower"; exit 1; }

      - name: Seed E2E account
        env:
          SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $E2E_PASSWORD" \
            "$SERVER_URL/internal/e2e/reset"

      - name: Write E2E credentials to gradle.properties
        env:
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          printf '\ne2eEmail=test+e2e@bran.name\ne2ePassword=%s\n' "$E2E_PASSWORD" >> gradle.properties

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-x86_64-default

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6a
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "AVD snapshot created for caching"

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          SERVER_BASE_URL: ${{ secrets.API_TEST_SERVER_URL }}
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6a
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :app:connectedAndroidTest

      - name: Clear rate limits for E2E user
        if: always()
        env:
          SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $E2E_PASSWORD" \
            -H "Content-Type: application/json" \
            -d '{"username":"test+e2e@bran.name"}' \
            "$SERVER_URL/internal/clear-rate-limits" || true
