name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: health_test
          POSTGRES_USER: health
          POSTGRES_PASSWORD: health
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew :server:test
        env:
          SERVER_BASE_URL: https://placeholder

  app-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew :app:test
        env:
          SERVER_BASE_URL: https://placeholder

  build-push:
    if: github.event_name == 'push'
    needs: [server-tests, app-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: true
          build-args: GIT_SHA=${{ github.sha }}
          tags: |
            ghcr.io/branneman/health-server:latest
            ghcr.io/branneman/health-server:${{ github.sha }}

  api-tests:
    if: github.event_name == 'push'
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5

      - name: Wait for Watchtower to deploy
        env:
          SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
        run: |
          EXPECTED="${{ github.sha }}"
          DEPLOYED=""
          for i in $(seq 1 20); do
            DEPLOYED=$(curl -sf "$SERVER_URL/version" | jq -r .sha 2>/dev/null) || DEPLOYED=""
            [ "$DEPLOYED" = "$EXPECTED" ] && echo "Server updated to $EXPECTED" && break
            echo "Attempt $i/20: deployed='$DEPLOYED', waiting 30s..."
            sleep 30
          done
          [ "$DEPLOYED" = "$EXPECTED" ] || { echo "Timed out waiting for Watchtower"; exit 1; }

      - name: Run API tests
        env:
          SERVER_BASE_URL: https://placeholder
          API_TEST_SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
          API_TEST_EMAIL: ${{ secrets.API_TEST_EMAIL }}
          API_TEST_PASSWORD: ${{ secrets.API_TEST_PASSWORD }}
        run: ./gradlew :server:apiTest

  e2e-tests:
    if: github.event_name == 'push'
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v5

      - name: Wait for Watchtower to deploy
        env:
          SERVER_URL: ${{ secrets.API_TEST_SERVER_URL }}
        run: |
          EXPECTED="${{ github.sha }}"
          DEPLOYED=""
          for i in $(seq 1 20); do
            DEPLOYED=$(curl -sf "$SERVER_URL/version" | jq -r .sha 2>/dev/null) || DEPLOYED=""
            [ "$DEPLOYED" = "$EXPECTED" ] && echo "Server updated to $EXPECTED" && break
            echo "Attempt $i/20: deployed='$DEPLOYED', waiting 30s..."
            sleep 30
          done
          [ "$DEPLOYED" = "$EXPECTED" ] || { echo "Timed out waiting for Watchtower"; exit 1; }

      - name: Seed E2E account
        env:
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          pip install bcrypt -q
          HASH=$(python3 -c "import bcrypt, os; print(bcrypt.hashpw(os.environ['E2E_PASSWORD'].encode(), bcrypt.gensalt()).decode())")
          install -m 600 /dev/null /tmp/vps_key
          echo "$VPS_SSH_PRIVATE_KEY" > /tmp/vps_key
          ssh -i /tmp/vps_key -o StrictHostKeyChecking=no deploy@"$VPS_HOST" \
            "docker exec -i health_postgres psql -U health -d health -v e2e_password_hash='$HASH'" \
            < local-db-seed/test-e2e-account-seed.sql
          rm /tmp/vps_key

      - name: Run E2E tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          SERVER_BASE_URL: ${{ secrets.API_TEST_SERVER_URL }}
          E2E_EMAIL: test+e2e@bran.name
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        with:
          api-level: 34
          target: default
          arch: x86_64
          profile: pixel_6a
          disable-animations: true
          script: ./gradlew :app:connectedAndroidTest
